<svg viewBox="0 0 260 48" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Koetai">
  <defs>
    <linearGradient id="Lbody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0f3460"/>
      <stop offset="60%"  stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#1d5299"/>
    </linearGradient>
    <linearGradient id="Lsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="Leye-upper"><rect x="66" y="10" width="16" height="8"/></clipPath>
    <clipPath id="Leye-lower"><rect x="66" y="18" width="16" height="8"/></clipPath>
    <clipPath id="Leye-ring"><circle cx="74" cy="18" r="7.5"/></clipPath>
  </defs>

  <!-- ── Fish mark (same as icon) ──────────────────────────────── -->
  <path d="M 18,15 C 12,9 5,7 6,13 C 7,17 13,17 18,17 Z" fill="#0d8a7c"/>
  <path d="M 18,31 C 12,37 5,40 6,34 C 7,30 13,30 18,30 Z" fill="#0d8a7c"/>

  <path d="M 18,15 C 30,10 50,8 66,10 C 78,11 88,16 91,23
           C 88,30 78,35 66,36 C 50,38 30,36 18,31 Z"
        fill="url(#Lbody)"/>
  <path d="M 18,15 C 30,10 50,8 66,10 C 78,11 88,16 91,23
           C 88,30 78,35 66,36 C 50,38 30,36 18,31 Z"
        fill="url(#Lsheen)"/>

  <path d="M 22,21 C 42,19 62,19 80,22"
        stroke="#4a7fc1" stroke-width="1.1" fill="none" opacity="0.55"/>
  <path d="M 22,25 C 42,23 62,23 80,26"
        stroke="#4a7fc1" stroke-width="0.8" fill="none" opacity="0.38"/>

  <path d="M 42,10 C 46,4 54,4 58,10"
        stroke="#0d8a7c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 68,35 C 62,42 56,44 58,39 Z" fill="#0d8a7c" opacity="0.85"/>

  <circle cx="74" cy="18" r="8.5"  fill="#091525"/>
  <circle cx="74" cy="18" r="7.5"  fill="#d6eaf8" clip-path="url(#Leye-upper)"/>
  <circle cx="74" cy="18" r="7.5"  fill="#0d8a7c"  clip-path="url(#Leye-lower)"/>
  <rect   x="66.5" y="17" width="15" height="2.2"
          fill="#091525" clip-path="url(#Leye-ring)"/>
  <circle cx="74" cy="14.5" r="2.2" fill="#091525"/>
  <circle cx="74" cy="21.5" r="2.0" fill="#091525"/>
  <circle cx="76"   cy="13"   r="1.0" fill="white" opacity="0.70"/>
  <circle cx="75.5" cy="20.5" r="0.7" fill="white" opacity="0.50"/>

  <!-- ── Wordmark ───────────────────────────────────────────────── -->
  <text x="100" y="32"
        font-family="'DM Sans', 'Segoe UI', sans-serif"
        font-size="24" font-weight="700"
        letter-spacing="-0.02em"
        fill="#1a4a8a">koetai</text>

  <!-- Teal accent dot on the 'i' override with a colour-matched dot -->
  <circle cx="247" cy="10" r="2.8" fill="#0d8a7c"/>
</svg>
