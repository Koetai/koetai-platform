{% extends "base.html" %}
{% block title %}{{ 'Edit' if example else 'New' }} Example — {{ ds.label }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('dashboard.index') }}">My Datasets</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('examples.list_examples', owner_orcid=ds.orcid_id, slug=ds.slug) }}">Examples</a></li>
        <li class="breadcrumb-item active">{{ 'Edit' if example else 'New' }}</li>
      </ol>
    </nav>
    <h4>{{ 'Edit' if example else 'New' }} SPARQL Example</h4>
    <form method="post" class="mt-3">
      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label">Label <span class="text-danger">*</span></label>
          <input type="text" name="label" class="form-control" required value="{{ example.label if example else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Slug <span class="text-danger">*</span></label>
          <input type="text" name="slug" class="form-control" required
                 value="{{ example.slug if example else '' }}"
                 pattern="[a-z0-9\-]+" title="Lowercase, numbers, hyphens">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control"
               value="{{ example.description if example else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">SPARQL Query <span class="text-danger">*</span></label>
        <textarea name="query" class="form-control font-monospace" rows="10" required>{{ example.query if example else ('SELECT ?s ?p ?o\nWHERE {\n  GRAPH <' + ds.graph_base + '/data> {\n    ?s ?p ?o\n  }\n}\nLIMIT 10') }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Keywords <small class="text-muted">(comma-separated)</small></label>
        <input type="text" name="keywords" class="form-control"
               value="{{ example.keywords | from_json | join(', ') if example and example.keywords else '' }}"
               placeholder="protein, pathway, disease">
      </div>
      <button type="submit" class="btn btn-primary">Save Example</button>
      <a href="{{ url_for('examples.list_examples', owner_orcid=ds.orcid_id, slug=ds.slug) }}"
         class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
